name: Rust release builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_suffix: linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_suffix: linux-arm64
            ext: ""
            cross_apt: gcc-aarch64-linux-gnu
            cross_linker: aarch64-linux-gnu-gcc
          - target: x86_64-apple-darwin
            os: macos-13
            asset_suffix: darwin-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_suffix: darwin-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_suffix: windows-x64
            ext: ".exe"
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: studio-web/pnpm-lock.yaml

      - name: Build studio-web bundle
        shell: bash
        run: |
          cd studio-web
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install cross-compile linker (Linux ARM only)
        if: matrix.cross_apt
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.cross_apt }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build fluxmirror + fluxmirror-studio (${{ matrix.target }})
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
          FLUXMIRROR_SKIP_WEB_BUILD: "1"
        run: |
          cargo build --release --target ${{ matrix.target }} -p fluxmirror-cli
          cargo build --release --target ${{ matrix.target }} -p fluxmirror-studio

      - name: Stage artifacts (POSIX)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          BIN="target/${{ matrix.target }}/release/fluxmirror${{ matrix.ext }}"
          STUDIO_BIN="target/${{ matrix.target }}/release/fluxmirror-studio${{ matrix.ext }}"
          cp "$BIN" "artifacts/fluxmirror-${{ matrix.asset_suffix }}${{ matrix.ext }}"
          cp "$STUDIO_BIN" "artifacts/fluxmirror-studio-${{ matrix.asset_suffix }}${{ matrix.ext }}"
          # Phase 1 backwards-compat aliases — same binary, legacy names.
          cp "$BIN" "artifacts/fluxmirror-hook-${{ matrix.asset_suffix }}${{ matrix.ext }}"
          cp "$BIN" "artifacts/fluxmirror-proxy-${{ matrix.asset_suffix }}${{ matrix.ext }}"
          ls -la artifacts/

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir artifacts
          set BIN=target\${{ matrix.target }}\release\fluxmirror${{ matrix.ext }}
          set STUDIO_BIN=target\${{ matrix.target }}\release\fluxmirror-studio${{ matrix.ext }}
          copy %BIN% artifacts\fluxmirror-${{ matrix.asset_suffix }}${{ matrix.ext }}
          copy %STUDIO_BIN% artifacts\fluxmirror-studio-${{ matrix.asset_suffix }}${{ matrix.ext }}
          copy %BIN% artifacts\fluxmirror-hook-${{ matrix.asset_suffix }}${{ matrix.ext }}
          copy %BIN% artifacts\fluxmirror-proxy-${{ matrix.asset_suffix }}${{ matrix.ext }}
          dir artifacts

      - name: Compute SHA256 companions
        shell: bash
        run: |
          cd artifacts
          # Only the canonical capture / studio names get .sha256
          # companions — `fluxmirror upgrade` uses these to verify the
          # downloaded asset before atomic swap. Legacy alias names
          # (`fluxmirror-hook-*`, `fluxmirror-proxy-*`) are unchanged.
          for f in \
            "fluxmirror-${{ matrix.asset_suffix }}${{ matrix.ext }}" \
            "fluxmirror-studio-${{ matrix.asset_suffix }}${{ matrix.ext }}"
          do
            if [ -f "$f" ]; then
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxmirror-${{ matrix.asset_suffix }}
          path: artifacts/*

      - name: Attach to GitHub release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
          body: |
            FluxMirror ${{ github.ref_name }}.

            Two binaries per arch:

            - `fluxmirror-<arch>` — capture / proxy / CLI reports. Required.
            - `fluxmirror-studio-<arch>` — local web dashboard at
              `127.0.0.1:7090`. Optional, opt-in.

            The legacy `fluxmirror-hook-<arch>` and `fluxmirror-proxy-<arch>`
            asset names continue to be published as copies of the
            capture binary so existing wrappers keep working. They will
            be removed in a future major release.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
