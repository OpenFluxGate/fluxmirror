name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} workspace tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlite3 CLI (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y sqlite3

      - name: Install sqlite3 CLI (macOS)
        if: runner.os == 'macOS'
        run: echo "sqlite3 ships with macOS"

      - name: Install sqlite3 CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install sqlite -y || echo "sqlite already installed"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build (workspace)
        run: cargo build --workspace --release

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: Wrapper script syntax checks (POSIX only)
        if: runner.os != 'Windows'
        run: |
          bash -n wrappers/shim.sh wrappers/router.sh
          bash -n plugins/fluxmirror/hooks/run-hook.sh
          bash -n gemini-extension/hooks/run-hook.sh
          bash -n scripts/test-rust-hook.sh
          bash -n scripts/bump-version.sh
          bash -n scripts/build-manifests.sh
          bash -n gemini-extension/scripts/report-data.sh

      - name: node --check shim.mjs (POSIX only)
        if: runner.os != 'Windows'
        run: node --check wrappers/shim.mjs

      - name: Manifest drift guard (POSIX only)
        if: runner.os != 'Windows'
        run: bash scripts/build-manifests.sh --check

      - name: Report-command shape guard (Linux only)
        if: runner.os == 'Linux'
        run: bash scripts/check-report-commands.sh

      - name: Extension-shape regression guard (Linux only)
        if: runner.os == 'Linux'
        run: bash scripts/check-extension-shape.sh

      - name: Rust binary regression suite (POSIX only)
        if: runner.os != 'Windows'
        run: bash scripts/test-rust-hook.sh

      - name: Slash-command python3/sqlite3 grep guard (POSIX only)
        if: runner.os != 'Windows'
        run: |
          if grep -REn "python3|sqlite3 |readlink /etc/localtime" \
                plugins/fluxmirror/commands gemini-extension/commands gemini-extension/scripts; then
            echo "Found forbidden tooling in slash commands. STEP 10 cleanup regressed."
            exit 1
          fi
