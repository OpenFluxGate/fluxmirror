name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash-hooks:
    name: Bash hook regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq + sqlite3
        run: sudo apt-get update -qq && sudo apt-get install -y jq sqlite3

      - name: Verify shared helper is in sync (no DRY drift)
        run: make verify-helpers

      - name: bash -n on hook scripts
        run: |
          bash -n plugins/fluxmirror/hooks/session-log.sh
          bash -n gemini-extension/hooks/session-log.sh
          bash -n scripts/verify-isolation.sh
          bash -n scripts/test-hooks.sh
          bash -n scripts/test-rust-hook.sh

      - name: Python parses _dual_write.py
        run: python3 -c "import ast; ast.parse(open('scripts/_dual_write.py').read())"

      - name: Run synthetic bash hook regression tests
        run: ./scripts/test-hooks.sh

  rust-hook:
    name: Rust hook tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sqlite3 (for parity test asserts)
        run: sudo apt-get update -qq && sudo apt-get install -y sqlite3

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-hook/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-hook/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build
        working-directory: rust-hook
        run: cargo build --release

      - name: cargo test (unit)
        working-directory: rust-hook
        run: cargo test --release

      - name: Run Rust binary parity tests (20-case)
        run: ./scripts/test-rust-hook.sh
