name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync version into all manifests
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          tmp=$(mktemp)

          # Top-level .version field
          for f in \
              gemini-extension/gemini-extension.json \
              plugins/fluxmirror/.claude-plugin/plugin.json
          do
            if [ -f "$f" ]; then
              jq --arg v "$v" '.version = $v' "$f" > "$tmp"
              mv "$tmp" "$f"
              echo "Synced $f -> $v"
            fi
          done

          # marketplace.json: version is inside .plugins[]
          if [ -f .claude-plugin/marketplace.json ]; then
            jq --arg v "$v" '.plugins |= map(.version = $v)' \
              .claude-plugin/marketplace.json > "$tmp"
            mv "$tmp" .claude-plugin/marketplace.json
            echo "Synced .claude-plugin/marketplace.json (nested) -> $v"
          fi

          rm -f "$tmp" || true

      - name: Sync shared _dual_write.py helper into both packages
        run: make sync-helpers

      - name: Strip macOS metadata before packaging
        run: |
          find gemini-extension plugins/fluxmirror -name '._*' -delete 2>/dev/null || true
          find gemini-extension plugins/fluxmirror -name '.DS_Store' -delete 2>/dev/null || true

      - name: Build gemini-extension archive (no AppleDouble)
        env:
          COPYFILE_DISABLE: "1"
        run: |
          tar --exclude='._*' --exclude='.DS_Store' \
              -czf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
              -C gemini-extension .

      - name: Verify archive structure (manifest + no AppleDouble)
        run: |
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./gemini-extension.json$' || { echo "manifest missing"; exit 1; }
          if tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz | grep -q '^\./\._'; then
            echo "ERROR: AppleDouble files in archive"
            tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz | grep '^\./\._'
            exit 1
          fi

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Java jar
        run: ./gradlew shadowJar

      - name: Rename jar for release
        run: cp build/libs/fluxmirror-all.jar fluxmirror-mcp-proxy.jar

      - name: Create release with archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz
            fluxmirror-mcp-proxy.jar
