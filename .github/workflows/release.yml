name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build gemini-extension archive
        run: |
          tar czf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz -C gemini-extension .

      - name: Verify archive structure
        run: |
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz | grep -q '^./gemini-extension.json$' || exit 1

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Java jar
        run: ./gradlew shadowJar

      - name: Rename jar for release
        run: cp build/libs/fluxmirror-all.jar fluxmirror-mcp-proxy.jar

      - name: Create release with archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz
            fluxmirror-mcp-proxy.jar
