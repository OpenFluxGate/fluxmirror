name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync version into all manifests
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          tmp=$(mktemp)

          # Top-level .version field
          for f in \
              gemini-extension/gemini-extension.json \
              plugins/fluxmirror/.claude-plugin/plugin.json
          do
            if [ -f "$f" ]; then
              jq --arg v "$v" '.version = $v' "$f" > "$tmp"
              mv "$tmp" "$f"
              echo "Synced $f -> $v"
            fi
          done

          # marketplace.json: version is inside .plugins[]
          if [ -f .claude-plugin/marketplace.json ]; then
            jq --arg v "$v" '.plugins |= map(.version = $v)' \
              .claude-plugin/marketplace.json > "$tmp"
            mv "$tmp" .claude-plugin/marketplace.json
            echo "Synced .claude-plugin/marketplace.json (nested) -> $v"
          fi

          rm -f "$tmp" || true

      - name: Strip macOS metadata before packaging
        run: |
          find gemini-extension plugins/fluxmirror wrappers -name '._*' -delete 2>/dev/null || true
          find gemini-extension plugins/fluxmirror wrappers -name '.DS_Store' -delete 2>/dev/null || true

      - name: Stage gemini-extension archive (with wrappers/)
        env:
          COPYFILE_DISABLE: "1"
        run: |
          set -euo pipefail
          stage=$(mktemp -d)
          # Copy gemini-extension contents to the archive root.
          cp -R gemini-extension/. "$stage/"
          # Copy the shared wrappers/ directory so hooks.json's
          # ${extensionPath}/wrappers/router.sh resolves at runtime.
          cp -R wrappers "$stage/wrappers"
          tar --exclude='._*' --exclude='.DS_Store' \
              -czf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
              -C "$stage" .

      - name: Verify archive structure (manifest + wrappers + no AppleDouble)
        run: |
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./gemini-extension.json$' || { echo "manifest missing"; exit 1; }
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./hooks/hooks.json$' || { echo "hooks.json missing"; exit 1; }
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./wrappers/router.sh$' || { echo "wrappers/router.sh missing"; exit 1; }
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./wrappers/shim.sh$' || { echo "wrappers/shim.sh missing"; exit 1; }
          tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz \
            | grep -q '^./wrappers/shim.mjs$' || { echo "wrappers/shim.mjs missing"; exit 1; }
          if tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz | grep -q '^\./\._'; then
            echo "ERROR: AppleDouble files in archive"
            tar tzf fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz | grep '^\./\._'
            exit 1
          fi

      - name: Create release with archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            fluxmirror-gemini-extension-${{ github.ref_name }}.tar.gz

      # Republish gemini-extension/* at the root of a dedicated branch so
      # Gemini CLI's `extensions install` (which expects gemini-extension.json
      # at the repo root, not in a subdirectory) works against THIS repo.
      # Users install with:
      #   gemini extensions install OpenFluxGate/fluxmirror --ref gemini-extension-pkg
      - name: Publish gemini-extension-pkg branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          stage=$(mktemp -d)
          cp -R gemini-extension/. "$stage/"
          # Republish the shared wrappers/ at the branch root so
          # hooks.json's ${extensionPath}/wrappers/router.sh resolves.
          cp -R wrappers "$stage/wrappers"
          cd "$stage"
          git init -q -b gemini-extension-pkg
          git -c user.name=release-bot -c user.email=release-bot@users.noreply.github.com \
              add -A
          git -c user.name=release-bot -c user.email=release-bot@users.noreply.github.com \
              commit -q -m "publish gemini-extension v${v}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gemini-extension-pkg

      # The per-arch Rust binaries (fluxmirror-hook + fluxmirror-proxy)
      # are uploaded to the same release by .github/workflows/rust-release.yml
      # which runs in parallel on tag pushes.
