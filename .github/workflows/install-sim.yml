name: Install simulation

on:
  push:
    branches: [main, feature/phase2]
  pull_request:
    branches: [main]

jobs:
  install-sim:
    name: Ubuntu install rehearsal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Static repo-shape guard
        run: bash scripts/check-extension-shape.sh

      - name: Live install simulation (Linux)
        run: bash scripts/install-sim-linux.sh
